<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EXPLAIN Visualizer — QueryLens</title>
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/components.css">
    <link rel="stylesheet" href="../css/explain.css">
</head>
<body>
    <header class="header">
        <h1><a href="../index.html">QueryLens</a></h1>
        <p class="tagline">EXPLAIN Plan Visualizer</p>
    </header>

    <main class="container explain-page">
        <div class="explain-layout">
            <section class="explain-controls">
                <label>
                    Workspace
                    <select id="workspace-select">
                        <option value="">Select a workspace</option>
                    </select>
                </label>

                <label>
                    SELECT query
                    <textarea id="sql-input" placeholder="SELECT * FROM orders JOIN users ON users.id = orders.user_id"></textarea>
                </label>

                <div class="explain-actions">
                    <button type="button" id="run-explain-btn" class="btn">Run EXPLAIN</button>
                    <button type="button" id="refresh-workspaces-btn" class="btn btn-secondary">Refresh Workspaces</button>
                </div>
            </section>

            <div id="error-banner" class="banner-error" hidden></div>
            <div id="info-banner" class="banner-info" hidden></div>

            <section id="summary-panel" class="explain-summary" hidden></section>

            <section class="explain-legend">
                <div class="legend-item">
                    <span class="legend-swatch" style="background:#ef4444;"></span>
                    Table scan (ALL)
                </div>
                <div class="legend-item">
                    <span class="legend-swatch" style="background:#f59e0b;"></span>
                    Full index scan
                </div>
                <div class="legend-item">
                    <span class="legend-swatch" style="background:#22c55e;"></span>
                    Index seek
                </div>
                <div class="legend-item">
                    <span class="legend-swatch" style="background:#64748b;"></span>
                    Operation / other
                </div>
            </section>

            <section id="tree-panel" class="explain-panel empty">
                <p>Choose a workspace and run EXPLAIN on a SELECT query.</p>
            </section>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
    <script src="../js/config.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/ui.js"></script>
    <script src="../js/workspaces.js"></script>
    <script src="../js/explain.js"></script>
</body>
</html>
