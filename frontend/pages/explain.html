<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EXPLAIN — QueryLens</title>
    <link rel="stylesheet" href="../css/variables.css">
    <link rel="stylesheet" href="../css/base.css">
    <link rel="stylesheet" href="../css/layout.css">
    <link rel="stylesheet" href="../css/components.css">
    <link rel="stylesheet" href="../css/pages/explain.css">
</head>
<body class="ql-app" data-page="explain">
    <aside class="ql-sidebar" id="app-sidebar">
        <div class="ql-sidebar-brand">
            <a href="../index.html"><i data-lucide="scan-search"></i><div>QUERYLENS<span>Database Engineering</span></div></a>
        </div>
        <div class="ql-sidebar-section">
            <div class="ql-sidebar-label">Workspace</div>
            <select id="workspace-select" class="select"><option value="">Select workspace</option></select>
        </div>
        <nav class="ql-nav" aria-label="Main">
            <a href="../index.html" data-nav="dashboard"><i data-lucide="layout-dashboard"></i> Dashboard</a>
            <a href="schema-builder.html" data-nav="schema-builder"><i data-lucide="table-2"></i> Schema Builder</a>
            <a href="er-diagram.html" data-nav="er-diagram"><i data-lucide="git-branch"></i> ER Diagram</a>
            <a href="explain.html" data-nav="explain"><i data-lucide="workflow"></i> EXPLAIN</a>
            <a href="normalization.html" data-nav="normalization"><i data-lucide="layers"></i> Normalization</a>
            <a href="index-advisor.html" data-nav="index-advisor"><i data-lucide="zap"></i> Index Advisor</a>
            <a href="reports.html" data-nav="reports"><i data-lucide="file-text"></i> Reports</a>
        </nav>
        <div class="ql-sidebar-footer">
            <a href="settings.html" data-nav="settings"><i data-lucide="settings"></i> Settings</a>
        </div>
    </aside>
    <div class="ql-main">
        <header class="ql-topbar">
            <span class="ql-page-title">EXPLAIN</span>
            <div class="ql-topbar-spacer"></div>
            <button type="button" id="refresh-workspaces-btn" class="btn btn-icon btn-secondary" title="Refresh"><i data-lucide="refresh-cw"></i></button>
        </header>
        <main class="ql-content ql-content--wide page-enter">
            <div id="error-banner" class="banner-error" hidden></div>
            <div id="info-banner" class="banner-info" hidden></div>

            <section class="card explain-editor-card">
                <label class="field-label" for="sql-input">SQL query</label>
                <textarea id="sql-input" class="code-input" rows="6" placeholder="SELECT * FROM orders JOIN users ON users.id = orders.user_id WHERE orders.status = 'pending'"></textarea>
                <div class="editor-actions">
                    <button type="button" id="run-explain-btn" class="btn btn-primary"><span class="btn-label">Run EXPLAIN</span></button>
                </div>
            </section>

            <section id="summary-panel" class="metric-grid" hidden></section>

            <section class="explain-legend card">
                <span class="legend-item"><span class="legend-swatch" style="background:#ef4444"></span> Table scan</span>
                <span class="legend-item"><span class="legend-swatch" style="background:#f59e0b"></span> Full index scan</span>
                <span class="legend-item"><span class="legend-swatch" style="background:#22c55e"></span> Index seek</span>
                <span class="legend-item"><span class="legend-swatch" style="background:#737373"></span> Operation</span>
            </section>

            <section id="tree-panel" class="card explain-tree-panel empty">
                <p>Run EXPLAIN on a SELECT query to visualize the execution plan.</p>
            </section>

            <section id="recommendations-panel" class="explain-recommendations" hidden>
                <h2 class="section-heading">Optimization recommendations</h2>
                <div id="recommendations-list" class="recommendation-grid"></div>
            </section>
        </main>
    </div>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
    <script src="../js/config.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/ui.js"></script>
    <script src="../js/shell.js"></script>
    <script src="../js/workspaces.js"></script>
    <script src="../js/explain.js"></script>
</body>
</html>
