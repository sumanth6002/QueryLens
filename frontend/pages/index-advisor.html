<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Index Advisor — QueryLens</title>
    <link rel="stylesheet" href="../css/variables.css">
    <link rel="stylesheet" href="../css/base.css">
    <link rel="stylesheet" href="../css/layout.css">
    <link rel="stylesheet" href="../css/components.css">
    <link rel="stylesheet" href="../css/pages/index-advisor.css">
</head>
<body class="ql-app" data-page="index-advisor">
    <aside class="ql-sidebar" id="app-sidebar">
        <div class="ql-sidebar-brand">
            <a href="../index.html"><i data-lucide="scan-search"></i><div>QUERYLENS<span>Database Engineering</span></div></a>
        </div>
        <div class="ql-sidebar-section">
            <div class="ql-sidebar-label">Workspace</div>
            <select id="workspace-select" class="select"><option value="">Select workspace</option></select>
        </div>
        <nav class="ql-nav" aria-label="Main">
            <a href="../index.html" data-nav="dashboard"><i data-lucide="layout-dashboard"></i> Dashboard</a>
            <a href="schema-builder.html" data-nav="schema-builder"><i data-lucide="table-2"></i> Schema Builder</a>
            <a href="er-diagram.html" data-nav="er-diagram"><i data-lucide="git-branch"></i> ER Diagram</a>
            <a href="explain.html" data-nav="explain"><i data-lucide="workflow"></i> EXPLAIN</a>
            <a href="normalization.html" data-nav="normalization"><i data-lucide="layers"></i> Normalization</a>
            <a href="index-advisor.html" data-nav="index-advisor"><i data-lucide="zap"></i> Index Advisor</a>
            <a href="reports.html" data-nav="reports"><i data-lucide="file-text"></i> Reports</a>
        </nav>
        <div class="ql-sidebar-footer">
            <a href="settings.html" data-nav="settings"><i data-lucide="settings"></i> Settings</a>
        </div>
    </aside>
    <div class="ql-main">
        <header class="ql-topbar">
            <span class="ql-page-title">Index Advisor</span>
            <div class="ql-topbar-spacer"></div>
            <button type="button" id="refresh-workspaces-btn" class="btn btn-icon btn-secondary" title="Refresh"><i data-lucide="refresh-cw"></i></button>
        </header>
        <main class="ql-content ql-content--wide page-enter ia-page">
            <div id="error-banner" class="banner-error" hidden></div>
            <div id="info-banner" class="banner-info" hidden></div>

            <section class="card ia-editor">
                <div class="ia-editor-header">
                    <label class="field-label" for="sql-input">SELECT query</label>
                    <p class="ia-editor-hint">Indexes are suggested for WHERE, JOIN, GROUP BY, and ORDER BY clauses.</p>
                </div>
                <textarea id="sql-input" class="code-input code-input--lg" rows="8" spellcheck="false" placeholder="SELECT * FROM orders&#10;WHERE user_id = 42&#10;ORDER BY created_at"></textarea>
                <div class="editor-actions">
                    <button type="button" id="analyze-btn" class="btn btn-primary">
                        <i data-lucide="zap"></i>
                        <span class="btn-label">Analyze Indexes</span>
                    </button>
                    <button type="button" id="save-btn" class="btn btn-secondary">
                        <i data-lucide="save"></i>
                        Analyze &amp; Save
                    </button>
                </div>
            </section>

            <section id="results-panel" class="ia-results" hidden>
                <div id="summary-panel" class="metric-grid ia-summary"></div>
                <h2 class="section-heading ia-results-title">Suggested indexes</h2>
                <div id="recommendations-list" class="recommendation-grid"></div>
                <details class="card ia-parsed">
                    <summary>Parsed query</summary>
                    <pre id="parsed-output" class="code-block"></pre>
                </details>
            </section>
        </main>
    </div>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="../js/config.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/ui.js"></script>
    <script src="../js/shell.js"></script>
    <script src="../js/workspaces.js"></script>
    <script src="../js/index-advisor.js"></script>
</body>
</html>
